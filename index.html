<meta charset="UTF-8" />
<title>IRONLOG — Physique &amp; Training Tracker</title>
<meta name="viewport" content="width=device-width, initial-scale=1, viewport-fit=cover" />
<meta name="apple-mobile-web-app-capable" content="yes" />
<meta name="apple-mobile-web-app-status-bar-style" content="black-translucent" />
<meta name="theme-color" content="#131110" />
<script src="https://unpkg.com/@zxing/library@0.21.3/umd/index.min.js" defer></script>
<style>
  :root{
    --bg:#EAE7E1; --surface:#F5F3EF; --surface-2:#FFFFFF; --border:#D6D1C7;
    --text:#201D19; --text-dim:#6B655C; --text-faint:#95897C;
    --accent:#A8431F; --accent-strong:#8A3417; --accent-soft:#A8431F1a;
    --good:#3E6B47; --good-soft:#3E6B4720;
    --warn:#96701F; --warn-soft:#96701F20;
    --info:#3E5C6B; --info-soft:#3E5C6B20;
    --danger:#9C3B3B;
    --radius:7px;
    --shadow:0 1px 2px rgba(20,16,10,.06);
    color-scheme: light;
  }
  @media (prefers-color-scheme: dark){
    :root{
      --bg:#131110; --surface:#1C1917; --surface-2:#221E1A; --border:#332E27;
      --text:#EDE7DD; --text-dim:#9C948A; --text-faint:#6B655C;
      --accent:#D3673D; --accent-strong:#E8825A; --accent-soft:#D3673D22;
      --good:#6FA378; --good-soft:#6FA37822;
      --warn:#D6AC55; --warn-soft:#D6AC5522;
      --info:#7FA0B0; --info-soft:#7FA0B022;
      --danger:#C96A6A;
      --shadow:0 1px 3px rgba(0,0,0,.35);
      color-scheme: dark;
    }
  }
  :root[data-theme="dark"]{
    --bg:#131110; --surface:#1C1917; --surface-2:#221E1A; --border:#332E27;
    --text:#EDE7DD; --text-dim:#9C948A; --text-faint:#6B655C;
    --accent:#D3673D; --accent-strong:#E8825A; --accent-soft:#D3673D22;
    --good:#6FA378; --good-soft:#6FA37822;
    --warn:#D6AC55; --warn-soft:#D6AC5522;
    --info:#7FA0B0; --info-soft:#7FA0B022;
    --danger:#C96A6A;
    --shadow:0 1px 3px rgba(0,0,0,.35);
    color-scheme: dark;
  }
  :root[data-theme="light"]{
    --bg:#EAE7E1; --surface:#F5F3EF; --surface-2:#FFFFFF; --border:#D6D1C7;
    --text:#201D19; --text-dim:#6B655C; --text-faint:#95897C;
    --accent:#A8431F; --accent-strong:#8A3417; --accent-soft:#A8431F1a;
    --good:#3E6B47; --good-soft:#3E6B4720;
    --warn:#96701F; --warn-soft:#96701F20;
    --info:#3E5C6B; --info-soft:#3E5C6B20;
    --danger:#9C3B3B;
    --shadow:0 1px 2px rgba(20,16,10,.06);
    color-scheme: light;
  }

  *{box-sizing:border-box;}
  html,body{margin:0;padding:0;}
  body{
    background:var(--bg); color:var(--text);
    font-family:-apple-system,BlinkMacSystemFont,"Segoe UI",Roboto,Helvetica,Arial,sans-serif;
    -webkit-font-smoothing:antialiased;
    min-height:100vh;
    overflow-x:hidden;
  }
  .num{font-family:ui-monospace,"SF Mono",Menlo,Consolas,monospace; font-variant-numeric:tabular-nums;}
  h1,h2,h3{text-wrap:balance; margin:0; font-weight:800;}
  .eyebrow{
    text-transform:uppercase; letter-spacing:.14em; font-size:11px;
    color:var(--text-faint); font-weight:700;
  }
  button{font-family:inherit;}
  input,select,textarea{font-family:inherit; color:var(--text); background:var(--surface-2); border:1px solid var(--border); border-radius:5px;}
  ::selection{background:var(--accent-soft);}
  a{color:var(--accent-strong);}

  #app{max-width:560px; margin:0 auto; min-height:100vh; display:flex; flex-direction:column; position:relative;}

  /* ---------- top bar ---------- */
  .topbar{
    position:sticky; top:0; z-index:20;
    background:var(--bg); border-bottom:1px solid var(--border);
    padding:calc(env(safe-area-inset-top) + 14px) 16px 12px;
  }
  .brand{display:flex; align-items:baseline; justify-content:space-between; margin-bottom:12px;}
  .brand-name{
    font-size:19px; font-weight:800; letter-spacing:-.01em; text-transform:uppercase;
    display:flex; align-items:center; gap:8px;
  }
  .brand-name .dot{width:8px;height:8px;border-radius:50%;background:var(--accent);display:inline-block;}
  .brand-tag{font-size:10.5px; color:var(--text-faint); letter-spacing:.12em; text-transform:uppercase;}

  .stat-rack{display:grid; grid-template-columns:repeat(4,1fr); gap:1px; background:var(--border); border:1px solid var(--border); border-radius:var(--radius); overflow:hidden;}
  .stat-cell{background:var(--surface); padding:9px 6px; text-align:center;}
  .stat-cell .v{font-size:16px; font-weight:700;}
  .stat-cell .l{font-size:9.5px; text-transform:uppercase; letter-spacing:.09em; color:var(--text-faint); margin-top:2px;}
  .phase-pill{
    display:inline-flex; align-items:center; gap:5px; padding:2px 8px 2px 6px;
    border-radius:20px; font-size:11px; font-weight:700; text-transform:uppercase; letter-spacing:.06em;
  }
  .phase-pill .sw{width:6px;height:6px;border-radius:50%;}
  .phase-bulk{background:var(--warn-soft); color:var(--warn);}
  .phase-cut{background:var(--info-soft); color:var(--info);}
  .phase-maintain{background:var(--good-soft); color:var(--good);}

  /* ---------- content ---------- */
  main{flex:1; padding:16px 16px 96px; display:flex; flex-direction:column; gap:18px;}
  .view{display:none; flex-direction:column; gap:18px; animation:fadein .18s ease;}
  .view.active{display:flex;}
  @keyframes fadein{from{opacity:0; transform:translateY(3px);} to{opacity:1; transform:none;}}
  @media (prefers-reduced-motion: reduce){ .view{animation:none;} }

  .section-head{display:flex; align-items:baseline; justify-content:space-between; border-bottom:1px solid var(--border); padding-bottom:7px;}
  .section-head h2{font-size:13px;}
  .section-head .hint{font-size:11.5px; color:var(--text-faint);}

  .card{
    background:var(--surface); border:1px solid var(--border); border-radius:var(--radius);
    padding:14px; box-shadow:var(--shadow);
  }
  .card + .card{margin-top:0;}
  .card-title{font-size:12.5px; font-weight:700; text-transform:uppercase; letter-spacing:.05em; color:var(--text-dim); margin-bottom:10px; display:flex; justify-content:space-between; align-items:center;}

  .row{display:flex; align-items:center; justify-content:space-between; gap:10px;}
  .row + .row{margin-top:8px; padding-top:8px; border-top:1px solid var(--border);}
  .row .k{font-size:13px; color:var(--text-dim);}
  .row .v{font-size:14px; font-weight:700;}

  .btn{
    appearance:none; border:1px solid var(--border); background:var(--surface-2); color:var(--text);
    padding:10px 14px; border-radius:6px; font-size:13.5px; font-weight:700; cursor:pointer;
    display:inline-flex; align-items:center; justify-content:center; gap:6px;
  }
  .btn:active{transform:scale(.98);}
  .btn:focus-visible, a:focus-visible, input:focus-visible, select:focus-visible, [tabindex]:focus-visible{outline:2px solid var(--accent); outline-offset:2px;}
  .btn-accent{background:var(--accent); border-color:var(--accent); color:#fff;}
  .btn-block{width:100%;}
  .btn-ghost{background:transparent;}
  .btn-sm{padding:6px 10px; font-size:12px;}
  .btn-row{display:flex; gap:8px;}

  .field{display:flex; flex-direction:column; gap:5px;}
  .field label{font-size:11.5px; text-transform:uppercase; letter-spacing:.06em; color:var(--text-faint); font-weight:700;}
  .field input, .field select{padding:10px 10px; font-size:14.5px;}
  .field-grid{display:grid; grid-template-columns:1fr 1fr; gap:10px;}

  .empty{text-align:center; padding:26px 10px; color:var(--text-faint); font-size:13px;}

  /* dashboard weight chart */
  .chart-wrap{position:relative;}
  svg.chart{width:100%; height:120px; display:block;}
  .chart-empty{text-align:center; color:var(--text-faint); font-size:12.5px; padding:30px 0;}

  /* segmented control */
  .segmented{display:flex; background:var(--surface-2); border:1px solid var(--border); border-radius:6px; padding:2px;}
  .segmented button{flex:1; border:none; background:transparent; padding:8px 6px; font-size:12.5px; font-weight:700; border-radius:4px; color:var(--text-dim); cursor:pointer;}
  .segmented button.active{background:var(--accent); color:#fff;}

  /* day list (train tab) */
  .day-card{display:flex; align-items:center; justify-content:space-between; padding:13px 14px; cursor:pointer;}
  .day-card .d-label{font-size:14.5px; font-weight:800; text-transform:uppercase; letter-spacing:.02em;}
  .day-card .d-sub{font-size:11.5px; color:var(--text-faint); margin-top:2px;}
  .day-card .d-meta{font-size:11px; color:var(--text-faint); text-align:right;}
  .chev{color:var(--text-faint); font-size:16px;}

  .exercise-row{padding:11px 0; border-top:1px solid var(--border);}
  .exercise-row:first-child{border-top:none; padding-top:0;}
  .ex-head{display:flex; justify-content:space-between; align-items:baseline;}
  .ex-name{font-size:13.5px; font-weight:700;}
  .ex-range{font-size:11px; color:var(--text-faint);}
  .ex-last{font-size:11px; color:var(--text-faint); margin-top:2px;}
  .set-line{display:flex; align-items:center; gap:8px; margin-top:7px;}
  .set-line input{width:64px; padding:7px 8px; font-size:13px; text-align:center;}
  .set-line .x{color:var(--text-faint); font-size:12px;}
  .set-line .rm{background:none;border:none;color:var(--text-faint);font-size:15px;cursor:pointer;padding:2px 6px;}
  .add-set{margin-top:8px;}

  /* photos */
  .photo-grid{display:grid; grid-template-columns:repeat(3,1fr); gap:6px;}
  .photo-thumb{position:relative; aspect-ratio:3/4; border-radius:5px; overflow:hidden; border:1px solid var(--border); cursor:pointer;}
  .photo-thumb img{width:100%; height:100%; object-fit:cover; display:block;}
  .photo-thumb .tag{position:absolute; bottom:0; left:0; right:0; background:rgba(0,0,0,.55); color:#fff; font-size:9px; text-transform:uppercase; letter-spacing:.06em; padding:3px 5px; text-align:center;}
  .photo-thumb .date{position:absolute; top:4px; left:4px; background:rgba(0,0,0,.5); color:#fff; font-size:8.5px; padding:2px 5px; border-radius:3px;}
  .photo-thumb.is-goal{border-color:var(--accent);}
  .photo-thumb .goal-star{position:absolute; top:4px; right:4px; color:var(--accent-strong); font-size:11px; text-shadow:0 0 3px rgba(0,0,0,.6);}

  .compare-wrap{display:grid; grid-template-columns:1fr 1fr; gap:6px;}
  .compare-slot{aspect-ratio:3/4; border-radius:6px; border:1px solid var(--border); background:var(--surface-2); display:flex; align-items:center; justify-content:center; overflow:hidden; position:relative;}
  .compare-slot img{width:100%; height:100%; object-fit:cover;}
  .compare-slot .ph{font-size:11px; color:var(--text-faint); text-align:center; padding:8px;}
  .compare-label{font-size:10px; text-transform:uppercase; letter-spacing:.06em; color:var(--text-faint); text-align:center; margin-top:5px;}

  /* modal */
  .modal-veil{position:fixed; inset:0; background:rgba(10,8,6,.55); z-index:150; display:none; align-items:flex-end; justify-content:center;}
  .modal-veil.active{display:flex;}
  .modal{width:100%; max-width:560px; background:var(--surface); border-top:1px solid var(--border); border-radius:14px 14px 0 0; padding:18px 16px calc(env(safe-area-inset-bottom) + 18px); max-height:88vh; overflow-y:auto;}
  .modal-head{display:flex; justify-content:space-between; align-items:center; margin-bottom:14px;}
  .modal-head h3{font-size:15px; text-transform:uppercase; letter-spacing:.03em;}
  .modal-close{background:none;border:none;color:var(--text-dim);font-size:20px;cursor:pointer; padding:2px 6px;}
  .modal-body{display:flex; flex-direction:column; gap:12px;}
  .modal-full{max-height:none;}

  .photo-viewer img{width:100%; border-radius:8px; display:block;}

  /* nutrition */
  .macro-bar{display:flex; height:10px; border-radius:5px; overflow:hidden; border:1px solid var(--border);}
  .macro-bar div{height:100%;}
  .macro-legend{display:flex; gap:14px; margin-top:8px; flex-wrap:wrap;}
  .macro-legend .li{display:flex; align-items:center; gap:5px; font-size:11.5px; color:var(--text-dim);}
  .macro-legend .sw{width:8px;height:8px;border-radius:2px;}

  .tip{font-size:13px; line-height:1.55; color:var(--text-dim);}
  .tip strong{color:var(--text);}
  ul.plain{margin:0; padding-left:18px; font-size:13px; line-height:1.7; color:var(--text-dim);}
  ul.plain li strong{color:var(--text);}

  /* food log */
  .progress-row{display:flex; justify-content:space-between; font-size:11.5px; color:var(--text-dim); margin-bottom:4px;}
  .progress-bar{height:8px; border-radius:5px; background:var(--surface-2); border:1px solid var(--border); overflow:hidden;}
  .progress-bar > div{height:100%; background:var(--accent);}
  .progress-bar.over > div{background:var(--danger);}
  .food-row{display:flex; justify-content:space-between; align-items:center; padding:9px 0; border-top:1px solid var(--border); gap:8px;}
  .food-row:first-child{border-top:none;}
  .food-row .fname{font-size:13px; font-weight:600;}
  .food-row .fmeta{font-size:11px; color:var(--text-faint); margin-top:1px;}
  .food-row .fmacro{font-size:11.5px; color:var(--text-dim); white-space:nowrap;}
  .food-row .rm{background:none; border:none; color:var(--text-faint); font-size:15px; cursor:pointer; padding:2px 4px;}
  .search-result{display:flex; justify-content:space-between; align-items:center; padding:10px 0; border-top:1px solid var(--border); cursor:pointer;}
  .search-result:first-child{border-top:none;}
  .search-result:active{opacity:.6;}
  .search-result .rname{font-size:13.5px; font-weight:600;}
  .search-result .rmeta{font-size:11px; color:var(--text-faint); margin-top:1px;}
  .qty-preview{display:grid; grid-template-columns:repeat(4,1fr); gap:8px; text-align:center;}
  .qty-preview .qp{background:var(--surface-2); border:1px solid var(--border); border-radius:6px; padding:8px 4px;}
  .qty-preview .qp .v{font-size:14px; font-weight:700;}
  .qty-preview .qp .l{font-size:9.5px; color:var(--text-faint); text-transform:uppercase; letter-spacing:.06em; margin-top:2px;}
  .loading-row{text-align:center; padding:16px; color:var(--text-faint); font-size:12.5px;}
  .scan-wrap{border-radius:8px; overflow:hidden; border:1px solid var(--border); background:#000; position:relative;}
  .scan-wrap video{width:100%; display:block; max-height:280px; object-fit:cover;}
  .scan-frame{position:absolute; inset:18% 12%; border:2px solid var(--accent); border-radius:8px; pointer-events:none; opacity:.85;}

  /* look picker (onboarding + goal calc) */
  .look-grid{display:grid; grid-template-columns:repeat(4,1fr); gap:8px;}
  .look-grid.leans{grid-template-columns:repeat(3,1fr);}
  .look-opt{background:var(--surface-2); border:1px solid var(--border); border-radius:8px; padding:8px 6px 7px; cursor:pointer; text-align:center;}
  .look-opt.active{border-color:var(--accent); background:var(--accent-soft);}
  .look-opt svg{color:var(--text-dim); margin-bottom:2px;}
  .look-opt.active svg{color:var(--accent-strong);}
  .look-opt .ln{font-size:10px; font-weight:700; line-height:1.25;}
  .look-preview{display:flex; align-items:center; gap:14px; background:var(--surface-2); border:1px solid var(--border); border-radius:8px; padding:14px;}
  .look-preview svg{width:64px; flex:none; color:var(--accent-strong);}
  .look-preview .lp-num{font-size:24px; font-weight:800;}
  .look-preview .lp-sub{font-size:11.5px; color:var(--text-dim); margin-top:2px; line-height:1.4;}

  /* bottom nav */
  nav.tabbar{
    position:fixed; left:0; right:0; bottom:0; z-index:30;
    max-width:560px; margin:0 auto;
    background:var(--surface); border-top:1px solid var(--border);
    display:flex; padding:6px 4px calc(env(safe-area-inset-bottom) + 6px);
  }
  nav.tabbar button{
    flex:1; background:none; border:none; cursor:pointer; color:var(--text-faint);
    display:flex; flex-direction:column; align-items:center; gap:3px; padding:6px 2px; border-radius:8px;
  }
  nav.tabbar button.active{color:var(--accent);}
  nav.tabbar svg{width:20px; height:20px;}
  nav.tabbar span{font-size:9.5px; text-transform:uppercase; letter-spacing:.05em; font-weight:700;}

  /* onboarding */
  #onboard{position:fixed; inset:0; background:var(--bg); z-index:100; overflow-y:auto; display:none;}
  #onboard.active{display:block;}
  .ob-wrap{max-width:480px; margin:0 auto; padding:calc(env(safe-area-inset-top) + 34px) 22px 40px; display:flex; flex-direction:column; gap:22px;}
  .ob-head .eyebrow{margin-bottom:8px;}
  .ob-head h1{font-size:26px; text-transform:uppercase; letter-spacing:-.01em;}
  .ob-head p{color:var(--text-dim); font-size:13.5px; margin-top:8px; line-height:1.55;}
  .ob-note{font-size:12px; color:var(--text-faint); line-height:1.55; border-left:2px solid var(--accent); padding-left:10px;}

  #lockScreen{position:fixed; inset:0; background:var(--bg); z-index:200; display:none; align-items:center; justify-content:center;}
  #lockScreen.active{display:flex;}
  .lock-wrap{max-width:300px; width:100%; padding:24px; display:flex; flex-direction:column; gap:12px; text-align:center;}
  .lock-wrap h1{font-size:22px; text-transform:uppercase;}
  .lock-wrap input{text-align:center; font-size:24px; letter-spacing:10px; padding:14px; margin-top:6px;}
  .lock-wrap .btn-sm{margin:6px auto 0;}

  .toast{position:fixed; bottom:90px; left:50%; transform:translateX(-50%); background:var(--text); color:var(--bg); font-size:12.5px; font-weight:700; padding:9px 16px; border-radius:20px; z-index:80; opacity:0; pointer-events:none; transition:opacity .2s;}
  .toast.show{opacity:1;}

  .scale-note{font-size:11px; color:var(--text-faint); margin-top:6px;}
</style>

<div id="app">
  <header class="topbar">
    <div class="brand">
      <div class="brand-name"><span class="dot"></span>IRONLOG</div>
      <div class="brand-tag" id="dateStamp">—</div>
    </div>
    <div class="stat-rack" id="statRack"></div>
  </header>

  <main>
    <section class="view active" id="view-dash"></section>
    <section class="view" id="view-train"></section>
    <section class="view" id="view-photos"></section>
    <section class="view" id="view-fuel"></section>
    <section class="view" id="view-life"></section>
    <section class="view" id="view-settings"></section>
  </main>

  <nav class="tabbar" id="tabbar">
    <button data-tab="dash" class="active">
      <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round"><path d="M4 19V10M12 19V5M20 19v-6"/></svg>
      <span>Dash</span>
    </button>
    <button data-tab="train">
      <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round"><path d="M3 12h2m2-5v10M9 12h6M15 7v10m2-5h2M6.5 9v6M17.5 9v6"/></svg>
      <span>Train</span>
    </button>
    <button data-tab="photos">
      <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><rect x="3" y="6" width="18" height="14" rx="2"/><path d="M8 6l1.5-2h5L16 6"/><circle cx="12" cy="13" r="3.2"/></svg>
      <span>Photos</span>
    </button>
    <button data-tab="fuel">
      <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M7 3c0 3-2 3-2 6a4 4 0 0 0 8 0c0-1.5-.8-2-1-3.5C11.7 4 10.5 3.3 9.5 2c0 1.8-1 2-2.5 1z"/><path d="M9 13v7a2 2 0 0 0 2 2h2a2 2 0 0 0 2-2v-7"/></svg>
      <span>Fuel</span>
    </button>
    <button data-tab="life">
      <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M12 2v4M12 18v4M4.9 4.9l2.8 2.8M16.3 16.3l2.8 2.8M2 12h4M18 12h4M4.9 19.1l2.8-2.8M16.3 7.7l2.8-2.8"/><circle cx="12" cy="12" r="3.5"/></svg>
      <span>Life</span>
    </button>
    <button data-tab="settings">

<script>

/* ============================= DATA LAYER ============================= */

const DB_NAME = "ironlog_photos_v1";

const SPLIT = [

const ACTIVITY_LEVELS = [
  { key:"sedentary", label:"Desk job, little walking", mult:1.2 },

const CARDIO_TYPES = [
  {key:"walk", label:"Walk", met:3.5},
  {key:"dogwalk", label:"Dog Walk", met:3.3},
  {key:"run", label:"Run", met:9.5},
  {key:"bike", label:"Bike", met:7.5},
  {key:"hike", label:"Hike", met:6.0},
  {key:"swim", label:"Swim", met:7.0},
  {key:"soccer", label:"Soccer", met:7.5},
  {key:"other", label:"Other", met:5.0},
];
function estimateActivityCals(typeKey, minutes, weightLb){
  const t = CARDIO_TYPES.find(c=>c.key===typeKey) || CARDIO_TYPES[0];
  const kg = weightLb*0.453592;
  return Math.round(t.met * kg * (minutes/60));
}
function activityEntriesFor(date){ return STATE.activityLog.filter(a=>a.date===date); }
function activityCalsFor(date){ return activityEntriesFor(date).reduce((s,a)=>s+a.cals, 0); }

function defaultState(){
  return {
    profile: null, // {heightIn, age, sex, activity, neckIn, waistIn, goalWeightLb, phase, phaseStart, cutRatePct, bulkRateLb}
    weightLog: [],   // {date, lb}
    measureLog: [],  // {date, waistIn, neckIn, chestIn, armIn}
    workoutLog: [],  // {date, dayKey, exercises:[{n, sets:[{w,r}]}]}
    myFoods: [],     // {id, name, brand, cals100, protein100, carbs100, fat100, defaultGrams, isCustom, lastUsed}
    foodLog: [],     // {id, date, foodId, name, grams, cals, protein, carbs, fat}
    myRecipes: [],   // {id, name, servings, ingredients:[{name, grams, cals100, protein100, carbs100, fat100, isCustom}]}
    activityLog: [], // {id, date, type, minutes, distanceMi, note, cals}
    theme: "auto",
    appLockHash: null
  };
}
async function hashPin(pin){
  const enc = new TextEncoder().encode("ironlog_local_"+pin);
  const buf = await crypto.subtle.digest("SHA-256", enc);
  return Array.from(new Uint8Array(buf)).map(b=>b.toString(16).padStart(2,"0")).join("");
}

let STATE = loadState();

function loadState(){
  try{
    const raw = localStorage.getItem(LS_KEY);
    if(!raw) return defaultState();
    const parsed = JSON.parse(raw);
    return Object.assign(defaultState(), parsed);
  }catch(e){ return defaultState(); }
}
function saveState(){ localStorage.setItem(LS_KEY, JSON.stringify(STATE)); }

/* ---- IndexedDB for photos (can be large, localStorage is too small) ---- */
let dbPromise = null;
function getDB(){
  if(dbPromise) return dbPromise;
  dbPromise = new Promise((resolve,reject)=>{
    const req = indexedDB.open(DB_NAME, 1);
    req.onupgradeneeded = ()=>{
      const db = req.result;
      if(!db.objectStoreNames.contains("photos")){
        const store = db.createObjectStore("photos", {keyPath:"id"});
        store.createIndex("date", "date");
      }
    };
    req.onsuccess = ()=>resolve(req.result);
    req.onerror = ()=>reject(req.error);
  });
  return dbPromise;
}
async function addPhoto(photo){
  const db = await getDB();
  return new Promise((resolve,reject)=>{
    const tx = db.transaction("photos","readwrite");
    tx.objectStore("photos").put(photo);
    tx.oncomplete = ()=>resolve();
    tx.onerror = ()=>reject(tx.error);
  });
}
async function deletePhoto(id){
  const db = await getDB();
  return new Promise((resolve,reject)=>{
    const tx = db.transaction("photos","readwrite");
    tx.objectStore("photos").delete(id);
    tx.oncomplete = ()=>resolve();
    tx.onerror = ()=>reject(tx.error);
  });
}
async function getAllPhotos(){
  const db = await getDB();
  return new Promise((resolve,reject)=>{
    const tx = db.transaction("photos","readonly");
    const req = tx.objectStore("photos").getAll();
    req.onsuccess = ()=>resolve((req.result||[]).sort((a,b)=> b.date.localeCompare(a.date)));
    req.onerror = ()=>reject(req.error);
  });
}

/* ============================= HELPERS ============================= */
function uid(){ return Date.now().toString(36)+Math.random().toString(36).slice(2,8); }
function todayStr(){ const d=new Date(); return d.toISOString().slice(0,10); }
function fmtDate(s){
  const [y,m,d] = s.split("-").map(Number);
  const dt = new Date(y, m-1, d);
  return dt.toLocaleDateString(undefined,{month:"short", day:"numeric"});
}
function fmtDateLong(s){
  const [y,m,d] = s.split("-").map(Number);
  const dt = new Date(y, m-1, d);
  return dt.toLocaleDateString(undefined,{month:"short", day:"numeric", year:"numeric"});
}
function daysBetween(a,b){
  const [ay,am,ad]=a.split("-").map(Number), [by,bm,bd]=b.split("-").map(Number);
  return Math.round((new Date(by,bm-1,bd) - new Date(ay,am-1,ad))/86400000);
}
function addDaysStr(s, n){
  const [y,m,d]=s.split("-").map(Number);
  const dt = new Date(y,m-1,d); dt.setDate(dt.getDate()+n);
  return dt.toISOString().slice(0,10);
}
function esc(s){ return String(s).replace(/[&<>"']/g, c=>({"&":"&amp;","<":"&lt;",">":"&gt;",'"':"&quot;","'":"&#39;"}[c])); }
function toast(msg){
  const t = document.getElementById("toast");
  t.textContent = msg; t.classList.add("show");
  clearTimeout(toast._t);
  toast._t = setTimeout(()=>t.classList.remove("show"), 1800);
}
function openModal(html, opts){
  document.getElementById("modalRoot").innerHTML = html;
  document.getElementById("modalRoot").classList.toggle("modal-full", !!(opts&&opts.full));
  document.getElementById("modalVeil").classList.add("active");
}
function closeModal(){ stopBarcodeScan(); document.getElementById("modalVeil").classList.remove("active"); }

/* ---- camera barcode scanning (ZXing) ---- */
let zxingReader = null;
function stopBarcodeScan(){
  if(zxingReader){ try{ zxingReader.reset(); }catch(e){} zxingReader = null; }
  const wrap = document.getElementById("lfScanWrap");
  if(wrap) wrap.style.display = "none";
}
async function startBarcodeScan(onDetected){
  if(typeof ZXing==="undefined"){ toast("Scanner is still loading — try again in a second"); return; }
  if(!navigator.mediaDevices || !navigator.mediaDevices.getUserMedia){ toast("Camera not available on this browser"); return; }
  const wrap = document.getElementById("lfScanWrap");
  const videoEl = document.getElementById("lfScanVideo");
  if(!wrap || !videoEl) return;
  wrap.style.display = "block";
  try{
    zxingReader = new ZXing.BrowserMultiFormatReader();
    const devices = await ZXing.BrowserMultiFormatReader.listVideoInputDevices();
    const backCam = devices.find(d=>/back|rear|environment/i.test(d.label));
    const deviceId = backCam ? backCam.deviceId : (devices[devices.length-1] || {}).deviceId;
    await zxingReader.decodeFromVideoDevice(deviceId, videoEl, (result, err)=>{
      if(result) onDetected(result.getText());
    });
  }catch(e){
    toast("Camera access failed — check Safari's camera permission for this site");
    stopBarcodeScan();
  }
}
document.getElementById("modalVeil").addEventListener("click", e=>{
  if(e.target.id==="modalVeil") closeModal();
});

/* ============================= CALCULATIONS ============================= */
function latestWeight(){
  if(!STATE.weightLog.length) return STATE.profile ? STATE.profile.startWeightLb : null;
  return STATE.weightLog[STATE.weightLog.length-1].lb;
}
function bmr(weightLb, heightIn, age){
  const kg = weightLb*0.453592, cm = heightIn*2.54;
  return 10*kg + 6.25*cm - 5*age + 5; // Mifflin-St Jeor, male
}
function tdee(){
  const p = STATE.profile; if(!p) return null;
  const w = latestWeight() || p.startWeightLb;
  const mult = (ACTIVITY_LEVELS.find(a=>a.key===p.activity)||ACTIVITY_LEVELS[1]).mult;
  return Math.round(bmr(w, p.heightIn, p.age) * mult);
}
function navyBF(waistIn, neckIn, heightIn){
  if(!waistIn || !neckIn || waistIn<=neckIn) return null;
  const val = 86.010*Math.log10(waistIn-neckIn) - 70.041*Math.log10(heightIn) + 36.76;
  return Math.max(3, Math.min(45, val));
}
function currentBF(){
  const p = STATE.profile; if(!p) return null;
  const m = STATE.measureLog[STATE.measureLog.length-1];
  const waist = m ? m.waistIn : p.waistIn;
  const neck = m ? m.neckIn : p.neckIn;
  return navyBF(waist, neck, p.heightIn);
}
function recommendedPhase(bf){
  if(bf==null) return "bulk";
  if(bf < 13) return "bulk";
  if(bf < 17) return "maintain";
  return "cut";
}
function macroPlan(phase){
  const p = STATE.profile; if(!p) return null;
  const w = latestWeight() || p.startWeightLb;
  const base = tdee();
  let cals, proteinPerLb, fatPct, rateLabel;
  if(phase==="bulk"){
    cals = base + 275;
    proteinPerLb = 1.0; fatPct = 0.25;
    rateLabel = "≈ +0.25–0.4 lb / week";
  } else if(phase==="cut"){
    cals = Math.round(base - base*0.22);
    proteinPerLb = 1.1; fatPct = 0.28;
    rateLabel = "≈ –0.7–1.0 lb / week";
  } else {
    cals = base;
    proteinPerLb = 1.0; fatPct = 0.28;
    rateLabel = "recomposition — weight roughly flat";
  }
  const protein = Math.round(w*proteinPerLb);
  const fat = Math.round((cals*fatPct)/9);
  const carbCals = cals - protein*4 - fat*9;
  const carbs = Math.max(0, Math.round(carbCals/4));
  return {cals, protein, fat, carbs, rateLabel, base};
}
function phaseTimelineWeeks(phase){
  const p = STATE.profile; if(!p || !p.goalWeightLb) return null;
  const w = latestWeight() || p.startWeightLb;
  const diff = p.goalWeightLb - w;
  if(phase==="bulk"){
    if(diff<=0) return 0;
    return Math.ceil(diff/0.32);
  }
  if(phase==="cut"){
    if(diff>=0) return 0;
    return Math.ceil(Math.abs(diff)/(w*0.008));
  }
  return null;
}

/* ---- goal weight from a target look, using FFMI (a standard muscularity-vs-height
   measure) crossed with a target leanness — not photo pixel analysis, but the same
   math coaches use to reverse-engineer "what should I weigh to look like that" ---- */
const MUSCLE_LEVELS = [
  {key:"lean", ffmi:19.0, shoulderW:60, label:"Lean athletic", desc:"Fit, toned, not overtly muscular — runner or swimmer build"},
  {key:"athletic", ffmi:20.5, shoulderW:68, label:"Athletic", desc:"Visible muscle and V-taper without bulk — matches the physique you sent as your reference"},
  {key:"built", ffmi:22.0, shoulderW:76, label:"Built", desc:"Noticeably muscular, fills out a t-shirt — several years of serious training"},
  {key:"muscular", ffmi:23.5, shoulderW:84, label:"Very muscular", desc:"Near the top of what's achievable without gear — takes years"},
];
const LEAN_LEVELS = [
  {key:"lean", bf:15, abLevel:0, label:"Lean", desc:"Flat stomach, faint ab outline"},
  {key:"defined", bf:11, abLevel:2, label:"Defined", desc:"Visible abs most of the day — matches the physique you sent as your reference"},
  {key:"shredded", bf:7, abLevel:3, label:"Shredded", desc:"Fully visible abs and veins — contest-prep territory, hard to hold"},
];
function goalWeightFromLook(muscleKey, leanKey, heightIn){
  const m = MUSCLE_LEVELS.find(x=>x.key===muscleKey) || MUSCLE_LEVELS[1];
  const l = LEAN_LEVELS.find(x=>x.key===leanKey) || LEAN_LEVELS[1];
  const heightM = heightIn*0.0254;
  const lbmKg = (m.ffmi - 6.1*(1.8-heightM)) * heightM*heightM;
  const weightKg = lbmKg / (1-l.bf/100);
  return Math.round(weightKg/0.453592);
}
/* simple line-art torso silhouette used as a visual stand-in for "what look" —
   shoulderW controls the V-taper width, abLevel controls ab-line detail */
function bodySilhouetteSVG(shoulderW, abLevel){
  const waistW = abLevel>=3 ? 40 : 44;
  const sL=(100-shoulderW)/2, sR=100-sL;
  const wLx=(100-waistW)/2, wRx=100-wLx;
  const hipW = Math.min(96, waistW*1.15);
  const hL=(100-hipW)/2, hR=100-hL;
  let abs = "";
  if(abLevel>=1) abs += `<line x1="${wLx+6}" y1="66" x2="${wRx-6}" y2="66" stroke="currentColor" stroke-width="1.4" opacity="0.55"/>`;
  if(abLevel>=2){
    abs += `<line x1="${wLx+8}" y1="74" x2="${wRx-8}" y2="74" stroke="currentColor" stroke-width="1.4" opacity="0.55"/>`;
    abs += `<line x1="50" y1="59" x2="50" y2="82" stroke="currentColor" stroke-width="1.2" opacity="0.4"/>`;
  }
  if(abLevel>=3){
    abs += `<line x1="${wLx+1}" y1="58" x2="${wLx+13}" y2="70" stroke="currentColor" stroke-width="1.2" opacity="0.45"/>`;
    abs += `<line x1="${wRx-1}" y1="58" x2="${wRx-13}" y2="70" stroke="currentColor" stroke-width="1.2" opacity="0.45"/>`;
  }
  return `<svg viewBox="0 0 100 118" width="100%" style="display:block;">
    <circle cx="50" cy="10" r="9" fill="none" stroke="currentColor" stroke-width="2"/>
    <path d="M46,18 L46,26 L54,26 L54,18" fill="none" stroke="currentColor" stroke-width="2"/>
    <path d="M${sL},26 C${sL-3},42 ${wLx+3},50 ${wLx},60 L${hL},112 L${hR},112 L${wRx},60 C${wRx-3},50 ${sR+3},42 ${sR},26 Z"
      fill="none" stroke="currentColor" stroke-width="2.2" stroke-linejoin="round"/>
    ${abs}
  </svg>`;
}
function renderLookPicker(state, onChange){
  const lb = goalWeightFromLook(state.muscleKey, state.leanKey, state.heightIn);
  const mDesc = MUSCLE_LEVELS.find(m=>m.key===state.muscleKey).desc;
  const lDesc = LEAN_LEVELS.find(l=>l.key===state.leanKey);
  return {
    lb,
    html: `
      <div class="field"><label>How muscular</label>
        <div class="look-grid">
          ${MUSCLE_LEVELS.map(m=>`
            <div class="look-opt ${state.muscleKey===m.key?"active":""}" data-axis="muscle" data-v="${m.key}">
              ${bodySilhouetteSVG(m.shoulderW, 1)}
              <div class="ln">${m.label}</div>
            </div>
          `).join("")}
        </div>
        <div class="scale-note">${mDesc}</div>
      </div>
      <div class="field"><label>How lean</label>
        <div class="look-grid leans">
          ${LEAN_LEVELS.map(l=>`
            <div class="look-opt ${state.leanKey===l.key?"active":""}" data-axis="lean" data-v="${l.key}">
              ${bodySilhouetteSVG(68, l.abLevel)}
              <div class="ln">${l.label}</div>
            </div>
          `).join("")}
        </div>
        <div class="scale-note">${lDesc.desc} (~${lDesc.bf}% body fat)</div>
      </div>
      <div class="look-preview">
        ${bodySilhouetteSVG(MUSCLE_LEVELS.find(m=>m.key===state.muscleKey).shoulderW, LEAN_LEVELS.find(l=>l.key===state.leanKey).abLevel)}
        <div>
          <div class="lp-num num">${lb} lb</div>
          <div class="lp-sub">at your height, for this look. Not photo analysis — this is the same FFMI-based math coaches use to reverse-engineer target weight from a physique goal.</div>
        </div>
      </div>
    `
  };
}
function wireLookPicker(container, state, onChange){
  container.querySelectorAll(".look-opt").forEach(opt=>{
    opt.onclick = ()=>{
      if(opt.dataset.axis==="muscle") state.muscleKey = opt.dataset.v;
      else state.leanKey = opt.dataset.v;
      const r = renderLookPicker(state, onChange);
      container.innerHTML = r.html;
      wireLookPicker(container, state, onChange);
      onChange(r.lb, state);
    };
  });
}

    <div class="stat-cell"><span class="phase-pill ${pillClass}"><span class="sw" style="background:currentColor"></span>${phase}</span></div>
  `;

/* ============================= RENDER: DASHBOARD ============================= */
function weightChart(){
  const log = STATE.weightLog.slice(-30);
  if(log.length < 2) return `<div class="chart-empty">Log at least two weigh-ins to see your trend line.</div>`;
  const w = 520, h = 120, pad = 8;
  const vals = log.map(e=>e.lb);
  const min = Math.min(...vals)-1, max = Math.max(...vals)+1;
  const pts = log.map((e,i)=>{
    const x = pad + (i/(log.length-1))*(w-pad*2);
    const y = h-pad - ((e.lb-min)/(max-min))*(h-pad*2);
    return [x,y];
  });
  const path = pts.map((pt,i)=> (i===0?"M":"L")+pt[0].toFixed(1)+","+pt[1].toFixed(1)).join(" ");
  const areaPath = path + ` L${pts[pts.length-1][0].toFixed(1)},${h-pad} L${pts[0][0].toFixed(1)},${h-pad} Z`;
  const last = pts[pts.length-1];
  return `

function lastSessionFor(dayKey, exName){
  for(let i=STATE.workoutLog.length-1;i>=0;i--){
    const s = STATE.workoutLog[i];
    if(s.dayKey!==dayKey) continue;
    const ex = s.exercises.find(e=>e.n===exName);
    if(ex && ex.sets.length) return {date:s.date, sets:ex.sets};
  }
  return null;
}

function openWorkoutModal(dayKey){
  const day = SPLIT.find(d=>d.key===dayKey);
  const date = todayStr();
  let existing = STATE.workoutLog.find(s=>s.date===date && s.dayKey===dayKey);
  const draft = existing ? JSON.parse(JSON.stringify(existing)) :
    {date, dayKey, exercises: day.exercises.map(e=>({n:e.n, sets:[]}))};

  function renderBody(){
    const html = `
      <div class="modal-head"><h3>${day.label} — ${fmtDate(date)}</h3><button class="modal-close" onclick="closeModal()">&times;</button></div>
      <div class="modal-body">
        ${day.exercises.map((e,ei)=>{
          const last = lastSessionFor(dayKey, e.n);
          const sets = draft.exercises[ei].sets;
          return `
          <div class="exercise-row">
            <div class="ex-head"><span class="ex-name">${esc(e.n)}</span><span class="ex-range num">${e.r}</span></div>
            ${last? `<div class="ex-last">Last (${fmtDate(last.date)}): ${last.sets.map(s=>s.w+"×"+s.r).join(", ")}</div>`:``}
            <div class="sets-holder" data-ei="${ei}">
              ${sets.map((s,si)=>`
                <div class="set-line" data-si="${si}">
                  <input type="number" inputmode="decimal" class="num setW" placeholder="lb" value="${s.w!=null?s.w:''}">
                  <span class="x">×</span>
                  <input type="number" inputmode="numeric" class="num setR" placeholder="reps" value="${s.r!=null?s.r:''}">
                  <button class="rm" data-ei="${ei}" data-si="${si}">&times;</button>
                </div>`).join("")}
            </div>
            <button class="btn btn-sm add-set" data-ei="${ei}">+ Add Set</button>
          </div>`;
        }).join("")}
        <button class="btn btn-accent btn-block" id="wSave">Save Session</button>
        ${existing? `<button class="btn btn-block" id="wDelete" style="color:var(--danger)">Delete Session</button>`:``}
      </div>
    `;
    openModal(html, {full:true});
    wireBody();
  }

  function collectFromDOM(){
    document.querySelectorAll(".sets-holder").forEach(holder=>{
      const ei = +holder.dataset.ei;
      const lines = holder.querySelectorAll(".set-line");
      const sets = [];
      lines.forEach(line=>{
        const w = line.querySelector(".setW").value;
        const r = line.querySelector(".setR").value;
        sets.push({w: w===""?null:parseFloat(w), r: r===""?null:parseInt(r)});
      });
      draft.exercises[ei].sets = sets;
    });
  }

  function wireBody(){
    document.querySelectorAll(".add-set").forEach(btn=>{
      btn.onclick = ()=>{
        collectFromDOM();
        const ei = +btn.dataset.ei;
        const last = draft.exercises[ei].sets[draft.exercises[ei].sets.length-1];
        draft.exercises[ei].sets.push({w: last?last.w:null, r: last?last.r:null});
        renderBody();
      };
    });
    document.querySelectorAll(".rm").forEach(btn=>{
      btn.onclick = ()=>{
        collectFromDOM();
        const ei = +btn.dataset.ei, si = +btn.dataset.si;
        draft.exercises[ei].sets.splice(si,1);
        renderBody();
      };
    });
    document.getElementById("wSave").onclick = ()=>{
      collectFromDOM();
      const hasAny = draft.exercises.some(e=>e.sets.some(s=>s.w!=null||s.r!=null));
      if(!hasAny){ toast("Log at least one set"); return; }
      STATE.workoutLog = STATE.workoutLog.filter(s=>!(s.date===date && s.dayKey===dayKey));
      STATE.workoutLog.push(draft);
      STATE.workoutLog.sort((a,b)=>a.date.localeCompare(b.date));
      saveState(); closeModal(); toast("Session saved"); renderAll();
    };
    const delBtn = document.getElementById("wDelete");
    if(delBtn) delBtn.onclick = ()=>{
      STATE.workoutLog = STATE.workoutLog.filter(s=>!(s.date===date && s.dayKey===dayKey));
      saveState(); closeModal(); toast("Session deleted"); renderAll();
    };
  }

  renderBody();
}

function openPhotoShootModal(){
  let idx = 0;
  const date = todayStr();
  function render(){
    const step = SHOOT_STEPS[idx];
    openModal(`
      <div class="modal-head"><h3>Photo Set — Step ${idx+1} of ${SHOOT_STEPS.length}</h3><button class="modal-close" onclick="closeModal()">&times;</button></div>
      <div class="modal-body">
        <div class="eyebrow">${step.label}</div>
        <div class="tip">${step.instruction}</div>
        <div class="field"><label>Photo</label><input type="file" accept="image/*" capture="environment" id="shootFile"></div>
        <div class="btn-row">
          <button class="btn btn-block" id="shootSkip">Skip This Angle</button>
          <button class="btn btn-accent btn-block" id="shootNext">Save &amp; ${idx===SHOOT_STEPS.length-1?"Finish":"Next"}</button>
        </div>
      </div>
    `, {full:true});
    document.getElementById("shootSkip").onclick = ()=> advance();
    document.getElementById("shootNext").onclick = async ()=>{
      const f = document.getElementById("shootFile").files[0];
      if(f){
        const btn = document.getElementById("shootNext");
        btn.disabled = true; btn.textContent = "Saving…";
        try{
          const dataURL = await resizeImage(f);
          await addPhoto({id:uid(), date, tag:step.tag, angle:step.angle, dataURL});
        }catch(e){ /* skip silently, move on */ }
      }
      advance();
    };
  }
  function advance(){
    idx++;
    if(idx >= SHOOT_STEPS.length){ closeModal(); toast("Photo set saved"); renderPhotos(); return; }
    render();
  }
  render();
}

    }

}
function resizeImage(file, maxDim, quality){
  maxDim = maxDim || 1280; quality = quality || 0.86;
  return new Promise((resolve,reject)=>{
    const url = URL.createObjectURL(file);
    const img = new Image();
    img.onload = ()=>{
      let width = img.naturalWidth, height = img.naturalHeight;
      if(width > maxDim || height > maxDim){
        if(width > height){ height = Math.round(height*maxDim/width); width = maxDim; }
        else { width = Math.round(width*maxDim/height); height = maxDim; }
      }
      const canvas = document.createElement("canvas");
      canvas.width = width; canvas.height = height;
      canvas.getContext("2d").drawImage(img, 0, 0, width, height);
      URL.revokeObjectURL(url);
      resolve(canvas.toDataURL("image/jpeg", quality));
    };
    img.onerror = ()=>{ URL.revokeObjectURL(url); reject(new Error("image load failed")); };
    img.src = url;
  });
}
function openPhotoActionModal(id){

/* ============================= FOOD LOG ============================= */
function foodEntriesFor(date){ return STATE.foodLog.filter(e=>e.date===date); }
function foodTotalsFor(date){
  return foodEntriesFor(date).reduce((t,e)=>{
    t.cals += e.cals; t.protein += e.protein; t.carbs += e.carbs; t.fat += e.fat;
    return t;
  }, {cals:0, protein:0, carbs:0, fat:0});
}
function upsertMyFood(food){
  const idx = STATE.myFoods.findIndex(f=>f.id===food.id);
  food.lastUsed = todayStr();
  if(idx>-1) STATE.myFoods[idx] = food; else STATE.myFoods.push(food);
  saveState();
}
function addFoodEntry(date, food, grams){
  const scale = food.isCustom ? 1 : grams/100;
  const entry = {
    id: uid(), date, foodId: food.id, name: food.name,
    grams: food.isCustom ? null : grams,
    cals: Math.round(food.cals100*scale),
    protein: Math.round(food.protein100*scale*10)/10,
    carbs: Math.round(food.carbs100*scale*10)/10,
    fat: Math.round(food.fat100*scale*10)/10,
  };
  STATE.foodLog.push(entry);
  upsertMyFood(food);
  saveState();
  return entry;
}
function deleteFoodEntry(id){
  STATE.foodLog = STATE.foodLog.filter(e=>e.id!==id);
  saveState();
}
function recipeTotals(recipe){
  return recipe.ingredients.reduce((t,ing)=>{
    const scale = ing.isCustom ? 1 : (ing.grams||0)/100;
    t.cals += ing.cals100*scale; t.protein += ing.protein100*scale;
    t.carbs += ing.carbs100*scale; t.fat += ing.fat100*scale;
    return t;
  }, {cals:0, protein:0, carbs:0, fat:0});
}
function num(v){ const n = parseFloat(v); return isFinite(n) ? n : 0; }

function normalizeOFFProduct(product){
  const n = product.nutriments || {};
  const servingSize = parseFloat(product.serving_size) || 100;
  return {
    id: "off_" + (product.code || uid()),
    name: product.product_name || product.product_name_en || product.generic_name || "Unnamed product",
    brand: product.brands || "",
    cals100: num(n["energy-kcal_100g"]),
    protein100: num(n["proteins_100g"]),
    carbs100: num(n["carbohydrates_100g"]),
    fat100: num(n["fat_100g"]),
    defaultGrams: servingSize,
    isCustom: false
  };
}
async function offSearch(query){
  const url = `https://world.openfoodfacts.org/cgi/search.pl?search_terms=${encodeURIComponent(query)}&search_simple=1&action=process&json=1&page_size=25&sort_by=unique_scans_n`;
  const res = await fetch(url);
  if(!res.ok) throw new Error("search failed");
  const data = await res.json();
  return (data.products||[])
    .filter(p=>p.product_name && p.nutriments && p.nutriments["energy-kcal_100g"]!=null)
    .map(normalizeOFFProduct)
    .slice(0, 20);
}
async function offBarcode(code){
  const url = `https://world.openfoodfacts.org/api/v2/product/${encodeURIComponent(code)}.json`;
  const res = await fetch(url);
  if(!res.ok) throw new Error("lookup failed");
  const data = await res.json();
  if(data.status!==1 || !data.product) return null;
  return normalizeOFFProduct(data.product);
}

    <div class="card">
      <div class="tip">${explainPhaseChoice(bf, latestWeight()||p.startWeightLb, p.goalWeightLb || goalWeightFromLook(p.lookMuscle||"athletic", p.lookLean||"defined", p.heightIn), {muscleKey: p.lookMuscle||"athletic", leanKey: p.lookLean||"defined"})}</div>

    <div class="section-head"><h2 class="eyebrow">What Bulking Actually Is</h2></div>
    <div class="card">
      <ul class="plain">
        <li><strong>The mechanism:</strong> lifting with progressive overload creates a stimulus to build muscle; eating in a calorie surplus gives your body the extra energy and protein it needs to actually build that new tissue. Skip the surplus and the stimulus mostly just makes you stronger through the nervous system, not visibly bigger.</li>
        <li><strong>Surplus size:</strong> ~250–300 kcal above maintenance. More than that mostly adds fat, not muscle, at your training age.</li>
        <li><strong>Protein:</strong> ~1g per lb bodyweight, spread across 3–4 meals so you're never far from a dose.</li>
        <li><strong>Rate:</strong> aim for 0.25–0.4 lb/week gain. Faster than that on a lean bulk is fat, not gains.</li>
        <li><strong>Cycle length:</strong> run a lean bulk 10–16 weeks, then reassess with photos + waist measurement, not just the scale.</li>
        <li><strong>Training:</strong> your job on a bulk is progressive overload — same split, add a rep or a small plate most weeks.</li>
      </ul>
    </div>

    <div class="section-head"><h2 class="eyebrow">What Cutting Actually Is</h2></div>
    <div class="card">
      <ul class="plain">
        <li><strong>The mechanism:</strong> a calorie deficit forces your body to burn stored fat for energy. It does not build muscle — at best, high protein and continued heavy lifting help you hold onto the muscle you already have while the fat covering it comes off.</li>
        <li><strong>Deficit size:</strong> ~20–25% below maintenance. Deeper cuts speed fat loss but cost you strength and muscle.</li>
        <li><strong>Protein:</strong> push it up to ~1.1g/lb — this is what protects your muscle in a deficit.</li>
        <li><strong>Rate:</strong> 0.5–1% of bodyweight per week. At your weight that's roughly 0.8–1.6 lb/week; slower is more muscle-sparing.</li>
        <li><strong>Cycle length:</strong> 6–12 weeks, then either hold at maintenance for a few weeks or move into a bulk — don't cut indefinitely.</li>
        <li><strong>Training:</strong> keep weights heavy, let reps or sets drop slightly if recovery gets hard — the goal is to hold strength, not build it.</li>
      </ul>
    </div>

    <div class="section-head"><h2 class="eyebrow">Why Not Just Cut Right Now?</h2></div>
    <div class="card">
      <ul class="plain">
        <li><strong>Cutting reveals muscle, it doesn't create it.</strong> If you cut before you've built much muscle, you end up lean but small — visible abs on a thin frame, not the athletic V-taper look you're after.</li>
        <li><strong>You can't effectively build and lose at the same time.</strong> Building muscle needs a calorie surplus; losing fat needs a deficit. Doing both at once only works in narrow cases — very new lifters, or people starting from a higher body fat — and even then it's slow. Outside that window, alternating phases builds muscle faster and cuts fat faster than trying to do both badly at once.</li>
        <li><strong>The order that gets you to the reference look fastest:</strong> build the muscle (bulk) → reveal it (cut) → reassess and repeat if you want more size. Skipping straight to cutting just means a smaller reveal.</li>
      </ul>
    </div>

    <div class="section-head"><h2 class="eyebrow">Food Guide</h2></div>
    <div class="card">
      <ul class="plain">
        <li><strong>Protein:</strong> chicken breast/thigh, eggs, Greek yogurt, cottage cheese, lean beef, fish, whey.</li>
        <li><strong>Carbs:</strong> rice, oats, potatoes, fruit — time the biggest portion around your lift.</li>
        <li><strong>Fats:</strong> olive oil, nuts, peanut butter, avocado — don't drop these too low, they run your hormones.</li>
        <li><strong>Hydration:</strong> roughly half your bodyweight (lb) in ounces of water daily, more on training days.</li>
        <li><strong>Consistency beats precision:</strong> hitting your calories within ~100 kcal most days matters more than a perfect macro split some days.</li>
      </ul>
    </div>
  `;
  document.getElementById("fuelDate").onchange = (e)=>{ fuelLogDate = e.target.value || todayStr(); renderFuel(); };

  el.querySelectorAll(".food-row .rm").forEach(btn=>{

        results = []; searchState = "error"; errorMsg = "No product found for that barcode";
      }catch(e){
        searchState = "error"; errorMsg = "Lookup failed — check your connection";
      }
      document.getElementById("lfResults").innerHTML = resultsHTML();
    };
    const cfAdd = document.getElementById("cfAdd");
    if(cfAdd) cfAdd.onclick = ()=>{

        cals100: cals, protein100: num(document.getElementById("cfProtein").value),
        carbs100: num(document.getElementById("cfCarbs").value), fat100: num(document.getElementById("cfFat").value),
        defaultGrams: null, isCustom: true
      };
      addFoodEntry(date, food, null);
      closeModal(); toast("Logged"); renderFuel();
    };
    wireResultTaps();
    const mineTaps = document.querySelectorAll("#lfResults .search-result[data-i]");
    if(mode==="mine") mineTaps.forEach(row=>{

        const mine = STATE.myFoods.slice().sort((a,b)=>(b.lastUsed||"").localeCompare(a.lastUsed||""));
        picked = mine[+row.dataset.i];
        grams = picked.defaultGrams || 100;
        render();

    if(mode==="mine") return;

        render();
      };
    });
  }

  render();
}

/* ---- lightweight ingredient picker for recipes (search + my foods + custom, no barcode) ---- */
function openIngredientPicker(onAdd){
  let mode = "search";
  let results = [];
  let searchState = "idle";
  let errorMsg = "";
  let picked = null;
  let grams = 100;

  function macrosFor(food, g){
    const scale = food.isCustom ? 1 : g/100;
    return {
      cals: Math.round(food.cals100*scale), protein: Math.round(food.protein100*scale*10)/10,
      carbs: Math.round(food.carbs100*scale*10)/10, fat: Math.round(food.fat100*scale*10)/10,
    };
  }
  function render(){
    if(picked){
      const m = macrosFor(picked, grams);
      openModal(`
        <div class="modal-head"><h3>${esc(picked.name)}</h3><button class="modal-close" onclick="closeModal()">&times;</button></div>
        <div class="modal-body">
          ${!picked.isCustom? `<div class="field"><label>Amount (g)</label><input type="number" id="ipGrams" value="${grams}"></div>` : ``}
          <div class="qty-preview">
            <div class="qp"><div class="v num">${m.cals}</div><div class="l">kcal</div></div>
            <div class="qp"><div class="v num">${m.protein}g</div><div class="l">Protein</div></div>
            <div class="qp"><div class="v num">${m.carbs}g</div><div class="l">Carbs</div></div>
            <div class="qp"><div class="v num">${m.fat}g</div><div class="l">Fat</div></div>
          </div>
          <div class="btn-row">
            <button class="btn btn-block" id="ipBack">Back</button>
            <button class="btn btn-accent btn-block" id="ipAdd">Add Ingredient</button>
          </div>
        </div>
      `, {full:true});
      const gramsInput = document.getElementById("ipGrams");
      if(gramsInput) gramsInput.oninput = ()=>{ grams = num(gramsInput.value)||0; render(); };
      document.getElementById("ipBack").onclick = ()=>{ picked=null; render(); };
      document.getElementById("ipAdd").onclick = ()=>{
        onAdd({
          name: picked.name, grams: picked.isCustom? null : grams, isCustom: !!picked.isCustom,
          cals100: picked.cals100, protein100: picked.protein100, carbs100: picked.carbs100, fat100: picked.fat100
        });
        closeModal();
      };
      return;
    }
    const tabs = [["search","Search"],["mine","My Foods"],["custom","Custom"]];
    let body = "";
    if(mode==="search"){
      body = `
        <div class="field"><label>Ingredient name</label>
          <div style="display:flex; gap:8px;">
            <input type="text" id="ipQuery" placeholder="e.g. brown rice" style="flex:1;">
            <button class="btn btn-accent" id="ipSearchBtn">Search</button>
          </div>
        </div>
        <div id="ipResults">${resultsHTML()}</div>
      `;
    } else if(mode==="mine"){
      const mine = STATE.myFoods.slice().sort((a,b)=>(b.lastUsed||"").localeCompare(a.lastUsed||""));
      body = `<div id="ipResults">${
        mine.length===0? `<div class="empty">Nothing saved yet.</div>` :
        mine.map((f,i)=>`<div class="search-result" data-i="${i}"><div><div class="rname">${esc(f.name)}</div><div class="rmeta">${f.isCustom?"custom · "+f.cals100+" kcal":Math.round(f.cals100)+" kcal / 100g"}</div></div><span class="chev">›</span></div>`).join("")
      }</div>`;
    } else {
      body = `
        <div class="field"><label>Name</label><input type="text" id="icName" placeholder="e.g. Homemade sauce"></div>
        <div class="field-grid">
          <div class="field"><label>Calories</label><input type="number" id="icCals"></div>
          <div class="field"><label>Protein (g)</label><input type="number" id="icProtein"></div>
          <div class="field"><label>Carbs (g)</label><input type="number" id="icCarbs"></div>
          <div class="field"><label>Fat (g)</label><input type="number" id="icFat"></div>
        </div>
        <button class="btn btn-accent btn-block" id="icAdd">Add Ingredient</button>
      `;
    }
    openModal(`
      <div class="modal-head"><h3>Add Ingredient</h3><button class="modal-close" onclick="closeModal()">&times;</button></div>
      <div class="modal-body">
        <div class="segmented">${tabs.map(([k,l])=>`<button data-m="${k}" class="${mode===k?"active":""}">${l}</button>`).join("")}</div>
        ${body}
      </div>
    `, {full:true});
    wire();
  }
  function resultsHTML(){
    if(searchState==="loading") return `<div class="loading-row">Searching…</div>`;
    if(searchState==="error") return `<div class="loading-row">${esc(errorMsg)}</div>`;
    if(!results.length) return searchState==="done" ? `<div class="loading-row">No matches — try Custom instead.</div>` : "";
    return results.map((f,i)=>`<div class="search-result" data-i="${i}"><div><div class="rname">${esc(f.name)}</div><div class="rmeta">${Math.round(f.cals100)} kcal / 100g</div></div><span class="chev">›</span></div>`).join("");
  }
  function wire(){
    document.querySelectorAll(".segmented button[data-m]").forEach(b=>{
      b.onclick = ()=>{ mode = b.dataset.m; results=[]; searchState="idle"; render(); };
    });
    const searchBtn = document.getElementById("ipSearchBtn");
    if(searchBtn) searchBtn.onclick = async ()=>{
      const q = document.getElementById("ipQuery").value.trim();
      if(!q){ toast("Type something to search"); return; }
      searchState = "loading"; document.getElementById("ipResults").innerHTML = resultsHTML();
      try{ results = await offSearch(q); searchState = "done"; }
      catch(e){ searchState = "error"; errorMsg = "Search failed — check your connection"; }
      document.getElementById("ipResults").innerHTML = resultsHTML();
      wireTaps();
    };
    const icAdd = document.getElementById("icAdd");
    if(icAdd) icAdd.onclick = ()=>{
      const name = document.getElementById("icName").value.trim();
      const cals = num(document.getElementById("icCals").value);
      if(!name || !cals){ toast("Add a name and calories at least"); return; }
      picked = {
        name, isCustom: true, cals100: cals, protein100: num(document.getElementById("icProtein").value),
        carbs100: num(document.getElementById("icCarbs").value), fat100: num(document.getElementById("icFat").value)
      };
      render();
    };
    wireTaps();
  }
  function wireTaps(){
    document.querySelectorAll("#ipResults .search-result[data-i]").forEach(row=>{
      row.onclick = ()=>{
        if(mode==="mine"){
          const mine = STATE.myFoods.slice().sort((a,b)=>(b.lastUsed||"").localeCompare(a.lastUsed||""));
          picked = mine[+row.dataset.i];
        } else {
          picked = results[+row.dataset.i];
        }
        grams = (picked && picked.defaultGrams) || 100;
        render();
      };
    });
  }
  render();
}

/* ---- recipe builder ---- */
function openRecipeBuilderModal(existing, onDone){
  const draft = existing ? JSON.parse(JSON.stringify(existing)) : {id:uid(), name:"", servings:1, ingredients:[]};
  function render(){
    const t = recipeTotals(draft);
    const perServ = draft.servings>0 ? {
      cals: Math.round(t.cals/draft.servings), protein: Math.round(t.protein/draft.servings*10)/10,
      carbs: Math.round(t.carbs/draft.servings*10)/10, fat: Math.round(t.fat/draft.servings*10)/10
    } : {cals:0,protein:0,carbs:0,fat:0};
    openModal(`
      <div class="modal-head"><h3>${existing? "Edit Recipe":"New Recipe"}</h3><button class="modal-close" onclick="closeModal()">&times;</button></div>
      <div class="modal-body">
        <div class="field"><label>Recipe name</label><input type="text" id="rbName" value="${esc(draft.name)}" placeholder="e.g. Chicken rice bowl"></div>
        <div class="field"><label>Servings this makes</label><input type="number" id="rbServings" min="1" value="${draft.servings}"></div>
        <div>
          ${draft.ingredients.length===0? `<div class="empty">No ingredients yet.</div>` :
            draft.ingredients.map((ing,i)=>`
              <div class="food-row">
                <div><div class="fname">${esc(ing.name)}</div><div class="fmeta">${ing.grams? ing.grams+"g" : "fixed amount"}</div></div>
                <button class="rm" data-i="${i}">&times;</button>
              </div>`).join("")}
        </div>
        <button class="btn btn-block" id="rbAddIng">+ Add Ingredient</button>
        <div class="qty-preview">
          <div class="qp"><div class="v num">${perServ.cals}</div><div class="l">kcal/serv</div></div>
          <div class="qp"><div class="v num">${perServ.protein}g</div><div class="l">Protein</div></div>
          <div class="qp"><div class="v num">${perServ.carbs}g</div><div class="l">Carbs</div></div>
          <div class="qp"><div class="v num">${perServ.fat}g</div><div class="l">Fat</div></div>
        </div>
        <button class="btn btn-accent btn-block" id="rbSave">Save Recipe</button>
        ${existing? `<button class="btn btn-block" id="rbDelete" style="color:var(--danger)">Delete Recipe</button>`:``}
      </div>
    `, {full:true});
    document.getElementById("rbName").oninput = (e)=>{ draft.name = e.target.value; };
    document.getElementById("rbServings").onchange = (e)=>{ draft.servings = Math.max(1, parseInt(e.target.value)||1); render(); };
    document.querySelectorAll(".food-row .rm").forEach(btn=>{
      btn.onclick = ()=>{ draft.ingredients.splice(+btn.dataset.i,1); render(); };
    });
    document.getElementById("rbAddIng").onclick = ()=> openIngredientPicker((ing)=>{ draft.ingredients.push(ing); render(); });
    document.getElementById("rbSave").onclick = ()=>{
      draft.name = document.getElementById("rbName").value.trim() || "Untitled recipe";
      draft.servings = Math.max(1, parseInt(document.getElementById("rbServings").value)||1);
      if(!draft.ingredients.length){ toast("Add at least one ingredient"); return; }
      const idx = STATE.myRecipes.findIndex(r=>r.id===draft.id);
      if(idx>-1) STATE.myRecipes[idx] = draft; else STATE.myRecipes.push(draft);
      saveState(); closeModal(); toast("Recipe saved");
      if(onDone) onDone();
    };
    const delBtn = document.getElementById("rbDelete");
    if(delBtn) delBtn.onclick = ()=>{
      STATE.myRecipes = STATE.myRecipes.filter(r=>r.id!==draft.id);
      saveState(); closeModal(); toast("Recipe deleted");
      if(onDone) onDone();
    };
  }
  render();
}

/* ---- log a recipe as a food entry ---- */
function openRecipeLogModal(recipe, date, onDone){
  let servings = 1;

    const per = {cals:t.cals/recipe.servings, protein:t.protein/recipe.servings, carbs:t.carbs/recipe.servings, fat:t.fat/recipe.servings};
    const shown = {
      cals: Math.round(per.cals*servings), protein: Math.round(per.protein*servings*10)/10,
      carbs: Math.round(per.carbs*servings*10)/10, fat: Math.round(per.fat*servings*10)/10

      <div class="modal-body">
        <div class="field"><label>Servings</label><input type="number" step="0.5" id="rlServings" value="${servings}"></div>
        <div class="qty-preview">
          <div class="qp"><div class="v num">${shown.cals}</div><div class="l">kcal</div></div>

        <button class="btn btn-accent btn-block" id="rlAdd">Add to Log</button>
        <div class="btn-row">
          <button class="btn btn-block" id="rlEdit">Edit Recipe</button>
          <button class="btn btn-block" id="rlDelete" style="color:var(--danger)">Delete Recipe</button>
        </div>
      </div>
    `, {full:true});
    document.getElementById("rlServings").oninput = (e)=>{ servings = num(e.target.value)||0; render(); };
    document.getElementById("rlAdd").onclick = ()=>{
      STATE.foodLog.push({id:uid(), date, foodId:recipe.id, name:recipe.name, grams:null, cals:shown.cals, protein:shown.protein, carbs:shown.carbs, fat:shown.fat});
      saveState(); closeModal(); toast("Logged"); renderFuel();
      if(onDone) onDone();
    };
    document.getElementById("rlEdit").onclick = ()=> openRecipeBuilderModal(recipe, onDone);
    document.getElementById("rlDelete").onclick = ()=>{
      STATE.myRecipes = STATE.myRecipes.filter(r=>r.id!==recipe.id);
      saveState(); closeModal(); toast("Recipe deleted");
      if(onDone) onDone();
    };
  }
  render();
}

async function exportBackup(){
  const photos = await getAllPhotos();
  const blob = new Blob([JSON.stringify({state:STATE, photos}, null, 2)], {type:"application/json"});
  const url = URL.createObjectURL(blob);
  const a = document.createElement("a");
  a.href = url; a.download = `ironlog-backup-${todayStr()}.json`;
  document.body.appendChild(a); a.click(); a.remove();
  URL.revokeObjectURL(url);
  toast("Backup downloaded");
}
function importBackup(e){
  const file = e.target.files[0]; if(!file) return;
  const reader = new FileReader();
  reader.onload = async ()=>{
    try{
      const data = JSON.parse(reader.result);
      if(data.state) STATE = Object.assign(defaultState(), data.state);
      saveState();
      if(Array.isArray(data.photos)){
        for(const p of data.photos) await addPhoto(p);
      }
      toast("Backup restored"); renderAll();
    }catch(err){ toast("Couldn't read that file"); }
  };
  reader.readAsText(file);
}

      <ul class="plain">
        <li><strong>Low-maintenance options that read "athletic":</strong> textured crop, buzz cut, or a tapered side part — all fast to style, all work well with gym/soccer schedules where hair gets sweaty often.</li>
        <li><strong>If your hair has natural wave or curl,</strong> a slightly longer textured cut (curtain-adjacent) can work well — ask a barber what suits your texture rather than forcing a straight-hair style onto different hair.</li>
        <li><strong>Cut every 4–6 weeks</strong> to keep the shape — the style degrades faster than people expect, especially short cuts.</li>
        <li><strong>Bring reference photos to your barber</strong> (including the ones that inspired your physique goal, if they show a haircut you like) — showing beats describing.</li>
      </ul>
    </div>

    <div class="section-head"><h2 class="eyebrow">Skin Basics</h2></div>
    <div class="card">
      <ul class="plain">
        <li><strong>Wash your face 2x/day</strong> (morning + before bed) with a gentle cleanser — more than that can irritate skin and cause more oil production, not less.</li>
        <li><strong>Moisturize after washing,</strong> even if your skin feels oily — skipping it often makes oiliness worse.</li>
        <li><strong>Sunscreen if you're outside training or playing soccer</strong> — SPF 30+, reapply if you're out for hours. This matters more than most guys think, both for skin health and for not aging your skin early.</li>
        <li><strong>Shower soon after sweating heavily</strong> — sitting in sweat for hours is the biggest driver of body/back acne for lifters and athletes.</li>
      </ul>
    </div>

    <div class="section-head"><h2 class="eyebrow">Getting Back Into Soccer</h2></div>
    <div class="card">
      <div class="tip" style="margin-bottom:10px;">Soccer is a great pairing with your physique goal — it builds the kind of functional, lean athleticism that a pure gym routine doesn't, and it's genuinely fun in a way the gym often isn't. Here's a simple 4-week path back in:</div>
      <ul class="plain">
        <li><strong>Week 1 — Touch:</strong> 15–20 min solo with a ball, 3–4x. Juggling, dribbling through cones/objects, passing against a wall. This rebuilds ball control fast without needing anyone else.</li>
        <li><strong>Week 2 — Wind:</strong> add short interval runs (e.g. 30s hard / 90s walk × 8) twice this week — soccer conditioning is stop-start, very different from steady gym cardio, so this specifically rebuilds it.</li>
        <li><strong>Week 3 — Play:</strong> find a small-sided pickup game or kick around with a friend at game intensity, but keep it short (30–40 min) so you're not sore for the gym split.</li>
        <li><strong>Week 4 — Rejoin:</strong> look for a local pickup run, rec league, or open futsal night — search "[your city] pickup soccer" or apps like Popsa/Meetup often have local groups.</li>
        <li><strong>Fit with your split:</strong> play/train soccer on a rest day or the same day as Legs if needed — avoid stacking it right before a heavy squat session.</li>
      </ul>
    </div>

    <div class="section-head"><h2 class="eyebrow">Other Sports Worth Trying</h2><span class="hint">for the athletic look</span></div>
    <div class="card">
      <ul class="plain">
        <li><strong>Basketball:</strong> similar stop-start conditioning to soccer, easy to find pickup games, builds vertical/explosiveness.</li>
        <li><strong>Swimming:</strong> full-body conditioning with zero joint impact — great complement on a rest day.</li>
        <li><strong>Rock climbing:</strong> builds the lean, wide-lat look directly, and grip/back strength that carries over to pulling lifts.</li>
        <li><strong>Boxing or BJJ:</strong> brutal conditioning, builds core and rotational strength, and is its own confidence-building skill outside the gym.</li>
      </ul>
    </div>
  `;
}

/* ============================= ONBOARDING ============================= */
let obStep = 1;
let obDraft = {};
let obLookState = null;
let obGoalPhotoPending = null;
function startOnboard(editing){
  obStep = 1;
  const p = STATE.profile;
  obDraft = p ? JSON.parse(JSON.stringify(p)) : {
    heightIn: 69.5, age: 18, activity:"moderate",
    neckIn:null, waistIn:null, startWeightLb:160,
    phase:"bulk", phaseStart: todayStr(), goalWeightLb:null
  };
  obLookState = {muscleKey: obDraft.lookMuscle||"athletic", leanKey: obDraft.lookLean||"defined", heightIn: obDraft.heightIn};
  obGoalPhotoPending = null;
  renderObStep();
}
function renderObStep(){
  document.getElementById("obStepNum").textContent = obStep;
  document.getElementById("obBack").style.display = obStep>1 ? "inline-flex" : "none";
  const body = document.getElementById("obBody");
  if(obStep===1){
    body.innerHTML = `
      <div class="field-grid">
        <div class="field"><label>Height (ft)</label><input type="number" id="obFt" value="${Math.floor(obDraft.heightIn/12)}"></div>
        <div class="field"><label>Height (in)</label><input type="number" step="0.5" id="obIn" value="${(obDraft.heightIn%12).toFixed(1)}"></div>
      </div>
      <div class="field-grid">
        <div class="field"><label>Age</label><input type="number" id="obAge" value="${obDraft.age}"></div>
        <div class="field"><label>Current weight (lb)</label><input type="number" step="0.1" id="obWeight" value="${obDraft.startWeightLb}"></div>
      </div>
      <div class="field"><label>Daily activity (outside training)</label>
        <select id="obActivity">
          ${ACTIVITY_LEVELS.map(a=>`<option value="${a.key}" ${obDraft.activity===a.key?"selected":""}>${a.label}</option>`).join("")}
        </select>
      </div>
    `;
  } else if(obStep===2){
    body.innerHTML = `
      <div class="ob-note">Waist &amp; neck let IRONLOG estimate body fat with the U.S. Navy method — accurate within a couple percent, no fancy scale needed.</div>
      <div class="field-grid">
        <div class="field"><label>Waist (in)</label><input type="number" step="0.1" id="obWaist" value="${obDraft.waistIn||''}"></div>
        <div class="field"><label>Neck (in)</label><input type="number" step="0.1" id="obNeck" value="${obDraft.neckIn||''}"></div>
      </div>
      <ul class="plain">
        <li><strong>Waist:</strong> around your belly button, tape flat, don't suck in or flex.</li>
        <li><strong>Neck:</strong> just below your Adam's apple, tape tilted slightly downward in front.</li>
        <li><strong>Timing:</strong> first thing in the morning, after the bathroom, before eating — that's when readings are most consistent day to day.</li>
      </ul>
      <div class="scale-note">Not sure right now? Leave blank and add it later from the Dashboard — the app just won't show a body-fat estimate until then.</div>
    `;
  } else if(obStep===3){
    const r = renderLookPicker(obLookState, ()=>{});
    body.innerHTML = `
      <div class="ob-note">Pick the look you're going for — this sets a personalized goal weight and shapes the guidance in later steps. This isn't reading a photo pixel-by-pixel (no app does that reliably); it's the same FFMI-based math coaches use.</div>
      <div id="obLookPicker">${r.html}</div>
      <div class="field" style="margin-top:4px;">
        <label>Save your reference photo (optional)</label>
        <input type="file" accept="image/*" id="obGoalPhoto">
        <div class="scale-note">Save your own copy of a photo that matches this look — it's tagged "Goal" and stays only on your phone, viewable anytime in the Photos tab next to your progress pics.</div>
      </div>
    `;
    wireLookPicker(document.getElementById("obLookPicker"), obLookState, ()=>{});
    document.getElementById("obGoalPhoto").onchange = (e)=>{ obGoalPhotoPending = e.target.files[0] || null; };
  } else {
    const tempBF = navyBF(parseFloat(obDraft.waistIn), parseFloat(obDraft.neckIn), obDraft.heightIn);
    const rec = recommendedPhase(tempBF);
    const lookLb = goalWeightFromLook(obLookState.muscleKey, obLookState.leanKey, obDraft.heightIn);
    const goalLb = obDraft.goalWeightLb || lookLb;
    const why = explainPhaseChoice(tempBF, obDraft.startWeightLb, goalLb, obLookState);
    body.innerHTML = `
      ${tempBF!=null? `<div class="ob-note">Estimated body fat: <strong>${tempBF.toFixed(1)}%</strong>. Suggested starting phase: <strong style="text-transform:capitalize">${rec}</strong>.</div>` : ``}
      <div class="tip">${why}</div>
      <div class="field"><label>Starting phase</label>
        <select id="obPhase">
          <option value="bulk" ${(obDraft.phase||rec)==="bulk"?"selected":""}>Bulk — build muscle</option>
          <option value="cut" ${(obDraft.phase||rec)==="cut"?"selected":""}>Cut — lose fat first</option>
          <option value="maintain" ${(obDraft.phase||rec)==="maintain"?"selected":""}>Maintain — recomposition</option>
        </select>
      </div>
      <div class="field"><label>Goal weight (lb)</label><input type="number" step="0.1" id="obGoal" value="${goalLb}"></div>
      <div class="scale-note">Pre-filled from the look you picked (${lookLb} lb) — edit it any time, and re-set it any time from the Dashboard. Your goal weight is a checkpoint, not a finish line.</div>
    `;
  }
}
function explainPhaseChoice(bf, weightLb, goalLb, look){
  const muscleLabel = MUSCLE_LEVELS.find(m=>m.key===look.muscleKey).label.toLowerCase();
  const leanLabel = LEAN_LEVELS.find(l=>l.key===look.leanKey);
  if(bf==null){
    return `Add your waist/neck numbers to get a body-fat estimate — it makes this recommendation specific instead of generic. For now: most beginners with visible extra softness around the midsection should cut first; most already-lean beginners should bulk first.`;
  }
  const diff = Math.round(goalLb - weightLb);
  if(bf >= leanLabel.bf + 4){
    return `You're at roughly ${bf.toFixed(1)}% body fat, above the ~${leanLabel.bf}% "${leanLabel.label.toLowerCase()}" look you picked. Cutting first makes sense — bulking on top of higher body fat mostly adds more fat, not the visible muscle you're after. Once you're closer to that leanness, you can bulk to add the size a ${muscleLabel} look needs.`;
  }
  if(diff > 8){
    return `You're already close to the leanness you picked (~${bf.toFixed(1)}% vs a ~${leanLabel.bf}% target), but you're about ${diff} lb of muscle away from a ${muscleLabel} look. Bulking first builds that muscle — you can cut the last bit of fat afterward to reveal it, which is faster than trying to build muscle in a deficit.`;
  }
  return `You're already close to both the leanness and the size for this look — a slow lean bulk or a maintenance recomposition phase (small surplus/deficit, focus on the lifts) will get you there without much fat gain.`;
}
document.getElementById("obNext").addEventListener("click", async ()=>{
  if(obStep===1){
    const ft = parseFloat(document.getElementById("obFt").value)||5;
    const inch = parseFloat(document.getElementById("obIn").value)||0;
    obDraft.heightIn = ft*12+inch;
    obDraft.age = parseInt(document.getElementById("obAge").value)||18;
    obDraft.startWeightLb = parseFloat(document.getElementById("obWeight").value)||160;
    obDraft.activity = document.getElementById("obActivity").value;
    obLookState.heightIn = obDraft.heightIn;
    obStep = 2; renderObStep();
  } else if(obStep===2){
    obDraft.waistIn = parseFloat(document.getElementById("obWaist").value)||null;
    obDraft.neckIn = parseFloat(document.getElementById("obNeck").value)||null;
    obStep = 3; renderObStep();
  } else if(obStep===3){
    obDraft.lookMuscle = obLookState.muscleKey;
    obDraft.lookLean = obLookState.leanKey;
    obDraft.goalWeightLb = null;
    if(obGoalPhotoPending){
      try{
        const dataURL = await resizeImage(obGoalPhotoPending);
        await addPhoto({id:uid(), date: todayStr(), tag:"goal", dataURL});
      }catch(e){ /* ignore — non-critical */ }
    }
    obStep = 4; renderObStep();
  } else {
    obDraft.phase = document.getElementById("obPhase").value;
    obDraft.goalWeightLb = parseFloat(document.getElementById("obGoal").value)||null;
    obDraft.phaseStart = obDraft.phaseStart || todayStr();
    finishOnboard();
  }
});
document.getElementById("obBack").addEventListener("click", ()=>{
  obStep = Math.max(1, obStep-1); renderObStep();
});
function finishOnboard(){
  const isNew = !STATE.profile;
  STATE.profile = obDraft;
  if(isNew && STATE.weightLog.length===0){
    STATE.weightLog.push({date: todayStr(), lb: obDraft.startWeightLb});
  }
  if(isNew && STATE.measureLog.length===0 && (obDraft.waistIn||obDraft.neckIn)){
    STATE.measureLog.push({date: todayStr(), waistIn:obDraft.waistIn, neckIn:obDraft.neckIn, chestIn:null, armIn:null});
  }
  saveState();
  document.getElementById("onboard").classList.remove("active");
  renderAll();
  toast(isNew? "Welcome to IRONLOG" : "Profile updated");
}

/* ============================= INIT ============================= */
function afterUnlock(){
  if(!STATE.profile){
    document.getElementById("onboard").classList.add("active");
    startOnboard(false);
  } else {
    renderAll();
  }
}
function showLockScreen(onUnlock){
  const el = document.getElementById("lockScreen");
  const input = document.getElementById("lockInput");
  const err = document.getElementById("lockError");
  el.classList.add("active");
  err.style.display = "none";
  input.value = "";
  const tryUnlock = async ()=>{
    const h = await hashPin(input.value);
    if(h === STATE.appLockHash){
      el.classList.remove("active");
      onUnlock();
    } else {
      err.style.display = "block";
      input.value = "";
      input.focus();
    }
  };
  document.getElementById("lockSubmit").onclick = tryUnlock;
  input.onkeydown = (e)=>{ if(e.key==="Enter") tryUnlock(); };
  document.getElementById("lockForgot").onclick = async ()=>{
    if(confirm("This erases all app data on this device — logs, photos, everything. There's no way to recover a forgotten PIN otherwise. Continue?")){
      localStorage.removeItem(LS_KEY);
      const db = await getDB();
      const tx = db.transaction("photos","readwrite");
      tx.objectStore("photos").clear();
      location.reload();
    }
  };
  setTimeout(()=>input.focus(), 50);
}
function init(){
  if(STATE.theme && STATE.theme!=="auto") setTheme(STATE.theme);
  if(STATE.appLockHash){
    showLockScreen(afterUnlock);
  } else {
    afterUnlock();
  }
}
init();
</script>
